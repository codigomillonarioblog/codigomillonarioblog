<style>
body {
    font-family: Arial, sans-serif;
}

.share-container {
    display: flex;
    align-items: center;
    font-size: 18px;
    color: #555;
    flex-wrap: wrap;
}

.share-text {
    margin-right: 15px;
    color: #666;
}

.share-icons {
    display: flex;
    gap: 22px;
}

.share-icons a {
    text-decoration: none;
    color: #555;
    font-size: 20px;
    transition: transform 0.2s ease, color 0.3s ease;
    display: flex;
    align-items: center;
}

.share-icons a:hover {
    transform: scale(1.2);
}

/* SVG de X */
.icon-x {
    width: 20px;
    height: 20px;
    fill: currentColor;
}

/* Colores */
.facebook:hover { color: #1877f2; }
.twitter:hover { color: #000; }
.linkedin:hover { color: #0077b5; }
.telegram:hover { color: #0088cc; }
.whatsapp:hover { color: #25d366; }
.email:hover { color: #333; }

/* Responsive */
@media (max-width: 600px) {
    .share-container {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .share-icons {
        gap: 14px;
    }

    .share-icons a {
        font-size: 18px;
    }

    .icon-x {
        width: 18px;
        height: 18px;
    }
}
</style>
</head>

<body>

<div class="share-container">
    <span class="share-text">Comparte en:</span>

    <div class="share-icons">
        <a href="#" id="fb" class="facebook"><i class="fab fa-facebook-f"></i></a>

        <!-- X (Twitter moderno con SVG real) -->
        <a href="#" id="tw" class="twitter">
            <svg viewBox="0 0 24 24" class="icon-x">
                <path d="M18.244 2H21.5l-7.5 8.573L22 22h-6.828l-5.35-6.996L3.5 22H.244l8.034-9.177L0 2h6.828l4.843 6.347L18.244 2zm-1.2 18h1.87L6.08 4H4.09l12.954 16z"/>
            </svg>
        </a>

        <a href="#" id="ln" class="linkedin"><i class="fab fa-linkedin-in"></i></a>
        <a href="#" id="tg" class="telegram"><i class="fab fa-telegram-plane"></i></a>
        <a href="#" id="wa" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="#" id="em" class="email"><i class="fas fa-envelope"></i></a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const url = encodeURIComponent(window.location.href);
    const text = encodeURIComponent(document.title);

    document.getElementById("fb").href = "https://www.facebook.com/sharer/sharer.php?u=" + url;
    document.getElementById("tw").href = "https://twitter.com/intent/tweet?url=" + url + "&text=" + text;
    document.getElementById("ln").href = "https://www.linkedin.com/sharing/share-offsite/?url=" + url;
    document.getElementById("tg").href = "https://t.me/share/url?url=" + url + "&text=" + text;
    document.getElementById("wa").href = "https://api.whatsapp.com/send?text=" + text + "%20" + url;

    document.getElementById("em").addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = "mailto:?subject=" + text + "&body=" + text + "%0A%0A" + url;
    });

    ["fb","tw","ln","tg","wa"].forEach(function(id) {
        document.getElementById(id).target = "_blank";
    });
});
</script>
